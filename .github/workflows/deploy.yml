name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - name: Install Project Dependencies
        run: npm install
        
      - name: Compile Code into Production Distribution
        run: npm run build
        
      - name: Setup GitHub Pages Interface
        uses: actions/configure-pages@v4
        
      - name: Upload Compiled Dist Directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy Live Artifact to the Web
        id: deployment
        uses: actions/deploy-pages@v4
